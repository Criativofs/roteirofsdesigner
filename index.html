<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoIA Pro · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --surface: #0d1117;
  --border: #1e2a36;
  --accent: #00e5a0;
  --accent2: #ff4d6d;
  --text: #c8d8e8;
  --muted: #4a6070;
  --heading: 'Bebas Neue', sans-serif;
  --body: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ANIMATED BG */
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift { from { transform: translate(0,0); } to { transform: translate(60px,60px); } }

.bg-glow {
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

/* CARD */
.login-card {
  position: relative; z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 0 20px;
}

.card-inner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.6s ease;
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(24px); }
  to { opacity:1; transform: translateY(0); }
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-text {
  font-family: var(--heading);
  font-size: 48px;
  color: #fff;
  letter-spacing: 2px;
  line-height: 1;
}

.logo-text span { color: var(--accent); }

.logo-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
}

.tab-switch {
  display: flex;
  background: var(--bg);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 28px;
}

.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  background: none;
  color: var(--muted);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: 0 1px 8px rgba(0,0,0,0.3);
}

label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 16px;
}

label:first-of-type { margin-top: 0; }

input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: var(--body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
}

.btn-main {
  width: 100%;
  margin-top: 24px;
  padding: 14px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--body);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-main:hover { background: #00ffb2; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,160,0.25); }
.btn-main:active { transform: translateY(0); }

.error-msg {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.2);
  border-radius: 6px;
  font-size: 12px;
  color: var(--accent2);
  display: none;
}

.success-msg {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(0,229,160,0.06);
  border: 1px solid rgba(0,229,160,0.2);
  border-radius: 6px;
  font-size: 12px;
  color: var(--accent);
  display: none;
}

.divider {
  text-align: center;
  margin: 24px 0 0;
  font-size: 11px;
  color: var(--muted);
}

.divider a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}

/* ADMIN BADGE */
.admin-note {
  margin-top: 28px;
  padding: 12px;
  background: rgba(255,77,109,0.05);
  border: 1px solid rgba(255,77,109,0.15);
  border-radius: 6px;
  font-size: 11px;
  color: rgba(255,77,109,0.7);
  text-align: center;
  font-family: var(--mono);
  letter-spacing: 0.05em;
}

/* CLIENTS LIST (admin) */
.clients-list {
  margin-top: 16px;
  max-height: 140px;
  overflow-y: auto;
  display: none;
}

.client-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 12px;
}

.client-item span { color: var(--accent); font-family: var(--mono); }
.client-item button {
  background: none;
  border: 1px solid rgba(255,77,109,0.3);
  color: var(--accent2);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-card">
  <div class="card-inner">

    <div class="logo">
      <div class="logo-text">VIDEO<span>IA</span></div>
      <div class="logo-sub">Roteiro Profissional · Multi-Cliente</div>
    </div>

    <div class="tab-switch">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')">Admin</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <label>Seu nome ou código de acesso</label>
      <input type="text" id="clientName" placeholder="Ex: Ana Silva ou cliente-001" autocomplete="off" />

      <label>Senha</label>
      <input type="password" id="clientPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />

      <button class="btn-main" onclick="doLogin()">▶ Acessar Roteiro</button>

      <div class="error-msg" id="loginError">Usuário ou senha incorretos.</div>
      <div class="success-msg" id="loginSuccess">Entrando...</div>

      <div class="divider">Não tem acesso? Peça ao administrador.</div>
    </div>

    <!-- ADMIN FORM -->
    <div id="adminForm" style="display:none">
      <label>Senha Admin</label>
      <input type="password" id="adminPass" placeholder="Senha de administrador" />

      <button class="btn-main" onclick="doAdminLogin()" style="background:var(--accent2);color:#fff">
        🔐 Entrar como Admin
      </button>

      <div class="error-msg" id="adminError">Senha incorreta.</div>

      <div id="adminPanel" style="display:none; margin-top:20px">
        <label>Criar novo cliente</label>
        <input type="text" id="newClient" placeholder="Nome do cliente" style="margin-bottom:6px" />
        <input type="password" id="newPass" placeholder="Senha do cliente" />
        <button class="btn-main" onclick="createClient()" style="margin-top:12px; background: var(--border); color:var(--text)">
          + Criar Cliente
        </button>

        <div class="success-msg" id="createSuccess" style="display:none"></div>

        <label style="margin-top:20px">Clientes cadastrados</label>
        <div class="clients-list" id="clientsList"></div>
      </div>

      <div class="admin-note">ADMIN · Acesso restrito ao proprietário do sistema</div>
    </div>

  </div>
</div>

<script>
// ---- CONFIG ----
// Altere a senha admin aqui antes de publicar
const ADMIN_PASSWORD = 'fsdesigner@2026#';

// ---- TAB SWITCH ----
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('adminForm').style.display = tab === 'admin' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');
}

// ---- LOAD CLIENTS ----
function getClients() {
  return JSON.parse(localStorage.getItem('vidiapro_clients') || '{}');
}

function saveClients(clients) {
  localStorage.setItem('vidiapro_clients', JSON.stringify(clients));
}

// Seed default clients if none exist
(function seedDefaults() {
  let clients = getClients();
  if (Object.keys(clients).length === 0) {
    clients = {
      'demo': { pass: 'demo123', created: Date.now(), displayName: 'Cliente Demo' },
      'admin': { pass: 'admin123', created: Date.now(), displayName: 'Admin' }
    };
    saveClients(clients);
  }
})();

// ---- LOGIN ----
function doLogin() {
  const name = document.getElementById('clientName').value.trim().toLowerCase().replace(/\s+/,'-');
  const pass = document.getElementById('clientPass').value;
  const clients = getClients();
  const err = document.getElementById('loginError');
  const ok = document.getElementById('loginSuccess');

  err.style.display = 'none';
  ok.style.display = 'none';

  if (!name || !pass) { err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return; }

  const client = clients[name];
  if (!client || client.pass !== pass) {
    err.textContent = 'Usuário ou senha incorretos.';
    err.style.display = 'block';
    return;
  }

  ok.textContent = `Bem-vindo, ${client.displayName || name}! Redirecionando...`;
  ok.style.display = 'block';

  // Save session
  sessionStorage.setItem('vidiapro_user', name);
  sessionStorage.setItem('vidiapro_display', client.displayName || name);

  setTimeout(() => { window.location.href = 'roteiro.html'; }, 900);
}

// ---- ADMIN LOGIN ----
function doAdminLogin() {
  const pass = document.getElementById('adminPass').value;
  const err = document.getElementById('adminError');

  if (pass !== ADMIN_PASSWORD) {
    err.style.display = 'block';
    return;
  }

  err.style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('clientsList').style.display = 'block';
  renderClientsList();
}

// ---- CREATE CLIENT ----
function createClient() {
  const name = document.getElementById('newClient').value.trim().toLowerCase().replace(/\s+/g,'-');
  const pass = document.getElementById('newPass').value;
  const ok = document.getElementById('createSuccess');

  if (!name || !pass) return;

  const clients = getClients();
  clients[name] = {
    pass,
    created: Date.now(),
    displayName: document.getElementById('newClient').value.trim()
  };
  saveClients(clients);

  ok.textContent = `✓ Cliente "${name}" criado com senha "${pass}"`;
  ok.style.display = 'block';
  document.getElementById('newClient').value = '';
  document.getElementById('newPass').value = '';
  renderClientsList();

  setTimeout(() => ok.style.display = 'none', 4000);
}

// ---- RENDER CLIENTS ----
function renderClientsList() {
  const list = document.getElementById('clientsList');
  const clients = getClients();
  list.innerHTML = '';

  Object.entries(clients).forEach(([id, data]) => {
    const d = document.createElement('div');
    d.className = 'client-item';
    d.innerHTML = `<div><span>${data.displayName || id}</span> <small style="color:var(--muted);margin-left:6px">/ ${id}</small></div>
      <button onclick="deleteClient('${id}')">remover</button>`;
    list.appendChild(d);
  });
}

function deleteClient(id) {
  if (!confirm(`Remover cliente "${id}" e todos os seus dados?`)) return;
  const clients = getClients();
  delete clients[id];
  saveClients(clients);
  localStorage.removeItem(`vidiapro_progress_${id}`);
  localStorage.removeItem(`vidiapro_data_${id}`);
  renderClientsList();
}
</script>
</body>
</html>
